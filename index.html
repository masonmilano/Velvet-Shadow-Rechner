<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velvet Shadow Rechner</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    background:
        radial-gradient(circle at 20% 10%, rgba(212,175,55,0.16), transparent 25%),
        radial-gradient(circle at 80% 20%, rgba(139,0,0,0.35), transparent 30%),
        radial-gradient(circle at bottom, #3b050b 0%, #120004 45%, #030303 100%);
    color: #f5d28a;
    font-family: "Poppins", sans-serif;
    text-align: center;
    overflow-x: hidden;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        linear-gradient(120deg, transparent, rgba(212,175,55,0.06), transparent);
    animation: lightMove 7s infinite linear;
    pointer-events: none;
}

@keyframes lightMove {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}

header {
    padding: 32px 15px 10px;
}

h1 {
    font-family: "Orbitron", sans-serif;
    font-size: clamp(34px, 5vw, 58px);
    letter-spacing: 5px;
    color: #d4af37;
    margin: 0;
    animation: glowPulse 2s infinite alternate;
}

@keyframes glowPulse {
    from {
        text-shadow:
            0 0 10px #d4af37,
            0 0 25px #8b0000,
            0 0 45px #ff003c;
    }
    to {
        text-shadow:
            0 0 20px #ffd36b,
            0 0 45px #ff4d6d,
            0 0 75px #ff003c;
    }
}

.subtitle {
    margin-top: 8px;
    color: #fff1c2;
    letter-spacing: 3px;
    font-size: 13px;
    opacity: 0.85;
}

.time {
    margin-top: 14px;
    color: #d4af37;
    font-size: 14px;
}

.container {
    max-width: 1250px;
    margin: 28px auto;
    padding: 0 16px 45px;
}

.role-select {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 28px;
}

.role-btn,
button {
    border: none;
    border-radius: 14px;
    padding: 12px 18px;
    cursor: pointer;
    font-weight: 700;
    font-family: "Poppins", sans-serif;
    transition: transform .18s ease, box-shadow .18s ease, filter .18s ease, background .18s ease;
}

.role-btn {
    border: 1px solid rgba(212,175,55,0.6);
    background: rgba(10,0,0,0.55);
    color: #f5d28a;
    backdrop-filter: blur(12px);
}

.role-btn:hover,
.role-btn.active {
    transform: scale(1.08);
    background: linear-gradient(135deg, #8b0000, #1a0004);
    box-shadow: 0 0 22px rgba(212,175,55,0.65);
}

button:hover {
    transform: scale(1.07);
    box-shadow: 0 0 18px rgba(212,175,55,0.65);
}

button:active,
.role-btn:active,
.card:active {
    transform: scale(0.96);
}

.panel {
    display: none;
    opacity: 0;
    transform: translateY(12px);
}

.panel.active {
    display: block;
    animation: fadeIn .28s ease forwards;
}

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.section-title {
    font-family: "Orbitron", sans-serif;
    letter-spacing: 2px;
    color: #ffd36b;
    margin: 18px 0;
    text-shadow: 0 0 14px rgba(212,175,55,0.5);
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(235px, 1fr));
    gap: 20px;
}

.card {
    position: relative;
    background: rgba(20, 0, 0, 0.55);
    border: 1px solid rgba(212,175,55,0.35);
    border-radius: 22px;
    padding: 20px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow:
        0 0 22px rgba(139,0,0,0.45),
        inset 0 0 12px rgba(255,255,255,0.04);
    transition: transform .18s ease, box-shadow .18s ease, filter .18s ease, background .18s ease;
    cursor: pointer;
    overflow: hidden;
}

.card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.06);
    pointer-events: none;
}

.card:hover {
    transform: scale(1.045);
    background: linear-gradient(145deg, rgba(139,0,0,0.65), rgba(0,0,0,0.86));
    box-shadow:
        0 0 26px rgba(212,175,55,0.65),
        0 0 55px rgba(139,0,0,0.7);
    filter: brightness(1.12);
}

.card h3 {
    margin: 0 0 8px;
    color: #ffd36b;
    font-size: 21px;
}

.price {
    color: #fff4cf;
    font-size: 14px;
    margin-bottom: 14px;
}

.counter {
    font-size: 36px;
    font-weight: 700;
    color: white;
    text-shadow: 0 0 15px rgba(212,175,55,0.6);
}

.btn-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 14px;
}

.plus {
    background: linear-gradient(135deg, #d4af37, #ffd36b);
    color: #120004;
}

.minus {
    background: linear-gradient(135deg, #5c0b13, #8b0000);
    color: white;
}

.reset {
    background: #0c0c0c;
    border: 1px solid #d4af37;
    color: #d4af37;
}

.log-btn {
    background: linear-gradient(135deg, #d4af37, #f6cf63);
    color: #111;
    margin: 8px 5px;
}

.copy-btn {
    background: linear-gradient(135deg, #6a040f, #8b0000);
    color: white;
    margin: 8px 5px;
}

.total-box {
    margin: 28px auto;
    max-width: 720px;
    background: rgba(0,0,0,0.62);
    border: 1px solid rgba(212,175,55,0.55);
    border-radius: 24px;
    padding: 24px;
    backdrop-filter: blur(15px);
    box-shadow:
        0 0 25px rgba(212,175,55,0.22),
        0 0 60px rgba(139,0,0,0.35);
}

.total {
    font-size: 42px;
    color: #fff;
    font-weight: 700;
    text-shadow:
        0 0 15px rgba(212,175,55,0.8),
        0 0 30px rgba(139,0,0,0.9);
}

input,
select,
textarea {
    width: 100%;
    padding: 13px;
    border-radius: 14px;
    border: 1px solid rgba(212,175,55,0.6);
    background: rgba(5,5,5,0.85);
    color: white;
    margin: 9px 0;
    font-family: "Poppins", sans-serif;
    outline: none;
}

input:focus,
select:focus,
textarea:focus {
    box-shadow: 0 0 18px rgba(212,175,55,0.45);
}

textarea {
    height: 230px;
    resize: none;
}

textarea::-webkit-scrollbar {
    width: 8px;
}

textarea::-webkit-scrollbar-thumb {
    background: #d4af37;
    border-radius: 10px;
}

.private-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 18px;
    margin-top: 20px;
}

.private-card {
    background: rgba(30,0,15,0.62);
    border: 1px solid rgba(255,46,138,0.45);
    border-radius: 20px;
    padding: 18px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 30px rgba(255,46,138,0.18);
    transition: .18s;
}

.private-card:hover {
    transform: scale(1.035);
    box-shadow: 0 0 34px rgba(255,46,138,0.38);
}

.timer-big {
    font-size: 34px;
    color: white;
    font-weight: 700;
    text-shadow: 0 0 18px rgba(255,46,138,0.9);
}

footer {
    margin-top: 32px;
    color: #9d8540;
    font-size: 13px;
}
</style>
</head>

<body>

<audio id="clickSound" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
<audio id="hoverSound" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<header>
    <h1>VELVET SHADOW</h1>
    <div class="subtitle">Luxury Nightclub Rechner</div>
    <div class="time" id="time"></div>
</header>

<div class="container">

    <div class="role-select">
        <button class="role-btn active" onclick="showPanel('bar', this)">🍸 Bar</button>
        <button class="role-btn" onclick="showPanel('dancer', this)">💃 Tänzer/innen</button>
        <button class="role-btn" onclick="showPanel('security', this)">🛡️ Security</button>
        <button class="role-btn" onclick="showPanel('leadership', this)">👑 Leadership</button>
    </div>

    <section id="bar" class="panel active">
        <h2 class="section-title">BAR KASSE</h2>
        <div class="grid" id="products"></div>

        <div class="total-box">
            <h2>Gesamteinnahmen</h2>
            <div class="total" id="total">0$</div>
            <button class="log-btn" onclick="generateLog()">Discord Log erstellen</button>
            <button class="copy-btn" onclick="copyText('logOutput')">Log kopieren</button>
            <button class="reset" onclick="resetAll()">Alles zurücksetzen</button>
            <textarea id="logOutput" readonly placeholder="Hier erscheint dein Discord Log..."></textarea>
        </div>
    </section>

    <section id="dancer" class="panel">
        <h2 class="section-title">TÄNZER/INNEN BEREICH</h2>

        <div class="total-box">
            <h2>💃 Private Verwaltung</h2>
            <input id="dancerName" placeholder="Name Tänzer/in">
            <input id="customerName" placeholder="Name Kunde">
            <button class="plus" onclick="startPrivate()">Private starten</button>
            <button class="reset" onclick="clearPrivateHistory()">Private Verlauf löschen</button>
        </div>

        <div class="private-list" id="privateList"></div>

        <div class="total-box">
            <h2>Private Verlauf</h2>
            <button class="copy-btn" onclick="copyText('privateLog')">Verlauf kopieren</button>
            <textarea id="privateLog" readonly placeholder="Hier erscheint der Private Verlauf..."></textarea>
        </div>
    </section>

    <section id="security" class="panel">
        <h2 class="section-title">SECURITY LOG</h2>

        <div class="total-box">
            <input id="personName" placeholder="Name der Person">
            <input id="reason" placeholder="Grund / Situation">
            <select id="action">
                <option>Verwarnung</option>
                <option>Hausverbot</option>
                <option>Entfernt vom Gelände</option>
                <option>Security Einsatz</option>
            </select>

            <button class="log-btn" onclick="securityLog()">Security Log erstellen</button>
            <button class="copy-btn" onclick="copyText('securityOutput')">Log kopieren</button>
            <button class="reset" onclick="clearSecurityLog()">Security Log löschen</button>
            <textarea id="securityOutput" readonly></textarea>
        </div>
    </section>

    <section id="leadership" class="panel">
        <h2 class="section-title">LEADERSHIP ÜBERSICHT</h2>

        <div class="total-box">
            <p>Gesamtumsatz Bar:</p>
            <div class="total" id="leaderTotal">0$</div>
            <button class="log-btn" onclick="copySummary()">Tagesübersicht erstellen</button>
            <button class="copy-btn" onclick="copyText('summaryOutput')">Übersicht kopieren</button>
            <textarea id="summaryOutput" readonly></textarea>
        </div>
    </section>

</div>

<footer>by Mason Milano • Velvet Shadow</footer>

<script>
const products = [
    { name: "Velvet Kiss", price: 1200, type: "Getränk" },
    { name: "Midnight Smoke", price: 1300, type: "Getränk" },
    { name: "Dark Desire", price: 2400, type: "Getränk" },
    { name: "Shadow Martini", price: 2800, type: "Getränk" },
    { name: "Black Flame", price: 3200, type: "Getränk" },

    { name: "Silk Bites", price: 1600, type: "Speise" },
    { name: "Red Room Burger", price: 2200, type: "Speise" },
    { name: "Temptation Fries", price: 1200, type: "Speise" },
    { name: "Velvet Wings", price: 1800, type: "Speise" },
    { name: "Sweet Sin", price: 1500, type: "Speise" },

    { name: "Shadow Night Menü", price: 6900, type: "Menü" },
    { name: "VIP Temptation Menü", price: 9800, type: "Menü" }
];

let counts = JSON.parse(localStorage.getItem("velvet_counts")) || {};
products.forEach(p => {
    if (counts[p.name] === undefined) counts[p.name] = 0;
});

let currentTotal = 0;

function renderProducts() {
    const box = document.getElementById("products");
    box.innerHTML = "";

    products.forEach(p => {
        box.innerHTML += `
            <div class="card">
                <h3>${p.name}</h3>
                <div class="price">${p.type} • ${p.price.toLocaleString("de-DE")}$</div>
                <div class="counter" id="count-${cleanId(p.name)}">0</div>
                <div class="btn-row">
                    <button class="plus" onclick="addItem('${p.name}')">+1</button>
                    <button class="minus" onclick="removeItem('${p.name}')">-1</button>
                </div>
            </div>
        `;
    });
}

function cleanId(text) {
    return text.replaceAll(" ", "-").replaceAll("/", "-");
}

function addItem(name) {
    counts[name]++;
    update();
}

function removeItem(name) {
    if (counts[name] > 0) counts[name]--;
    update();
}

function calculateTotal() {
    let total = 0;
    products.forEach(p => total += counts[p.name] * p.price);
    return total;
}

function update() {
    let total = calculateTotal();

    products.forEach(p => {
        const el = document.getElementById(`count-${cleanId(p.name)}`);
        if (el) el.innerText = counts[p.name];
    });

    animateMoney(document.getElementById("total"), currentTotal, total);
    animateMoney(document.getElementById("leaderTotal"), currentTotal, total);

    currentTotal = total;
    localStorage.setItem("velvet_counts", JSON.stringify(counts));
}

function animateMoney(element, start, end) {
    const duration = 280;
    const startTime = performance.now();

    function step(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const value = Math.floor(start + (end - start) * progress);
        element.innerText = value.toLocaleString("de-DE") + "$";

        if (progress < 1) requestAnimationFrame(step);
    }

    requestAnimationFrame(step);
}

function resetAll() {
    if (!confirm("Wirklich alles zurücksetzen?")) return;

    products.forEach(p => counts[p.name] = 0);

    localStorage.removeItem("velvet_counts");
    localStorage.removeItem("velvet_log");

    document.getElementById("logOutput").value = "";
    update();
}

function generateLog() {
    let total = 0;
    let itemCount = 0;
    let text = `🖤 **Velvet Shadow Einnahmen-Log** 🖤\n\n`;

    text += `**Ausgaben:**\n`;

    products.forEach(p => {
        if (counts[p.name] > 0) {
            text += `• ${counts[p.name]}x ${p.name} - ${(counts[p.name] * p.price).toLocaleString("de-DE")}$\n`;
            total += counts[p.name] * p.price;
            itemCount += counts[p.name];
        }
    });

    if (itemCount === 0) text += `• Keine Artikel eingetragen\n`;

    text += `\n**Ausgaben Gesamt:** ${itemCount} Artikel\n`;
    text += `**Einnahmen:** ${total.toLocaleString("de-DE")}$\n`;
    text += `**Datum:** ${new Date().toLocaleString("de-DE")}\n`;
    text += `\n— Velvet Shadow`;

    document.getElementById("logOutput").value = text;
    localStorage.setItem("velvet_log", text);
}

function showPanel(id, btn) {
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".role-btn").forEach(b => b.classList.remove("active"));

    document.getElementById(id).classList.add("active");
    btn.classList.add("active");

    localStorage.setItem("velvet_active_panel", id);
}

function updateTime() {
    document.getElementById("time").innerText = new Date().toLocaleString("de-DE");
}

setInterval(updateTime, 1000);
updateTime();

/* PRIVATE TIMER */
let activePrivates = JSON.parse(localStorage.getItem("velvet_active_privates")) || [];
let privateHistory = localStorage.getItem("velvet_private_log") || "";

function startPrivate() {
    const dancer = document.getElementById("dancerName").value || "Unbekannt";
    const customer = document.getElementById("customerName").value || "Unbekannt";

    const privateObj = {
        id: Date.now(),
        dancer,
        customer,
        start: Date.now()
    };

    activePrivates.push(privateObj);
    savePrivates();
    renderPrivates();

    document.getElementById("dancerName").value = "";
    document.getElementById("customerName").value = "";
}

function stopPrivate(id) {
    const privateObj = activePrivates.find(p => p.id === id);
    if (!privateObj) return;

    const diff = Date.now() - privateObj.start;
    const minutes = Math.floor(diff / 60000);
    const seconds = Math.floor((diff % 60000) / 1000);

    const log = `💃 **Private beendet**
Tänzer/in: ${privateObj.dancer}
Kunde: ${privateObj.customer}
Dauer: ${minutes}m ${seconds}s
Start: ${new Date(privateObj.start).toLocaleString("de-DE")}
Ende: ${new Date().toLocaleString("de-DE")}
-----------------------------\n`;

    privateHistory += log;
    document.getElementById("privateLog").value = privateHistory;

    activePrivates = activePrivates.filter(p => p.id !== id);
    savePrivates();
    renderPrivates();
}

function renderPrivates() {
    const list = document.getElementById("privateList");
    list.innerHTML = "";

    if (activePrivates.length === 0) {
        list.innerHTML = `<div class="private-card">Keine laufenden Privates</div>`;
        return;
    }

    activePrivates.forEach(p => {
        const diff = Date.now() - p.start;
        const min = Math.floor(diff / 60000);
        const sec = Math.floor((diff % 60000) / 1000);

        list.innerHTML += `
            <div class="private-card">
                <h3>💃 ${p.dancer}</h3>
                <p>Kunde: ${p.customer}</p>
                <div class="timer-big">${String(min).padStart(2, "0")}:${String(sec).padStart(2, "0")}</div>
                <button class="minus" onclick="stopPrivate(${p.id})">Private stoppen</button>
            </div>
        `;
    });
}

function savePrivates() {
    localStorage.setItem("velvet_active_privates", JSON.stringify(activePrivates));
    localStorage.setItem("velvet_private_log", privateHistory);
}

function clearPrivateHistory() {
    if (!confirm("Private Verlauf wirklich löschen?")) return;
    privateHistory = "";
    activePrivates = [];
    localStorage.removeItem("velvet_private_log");
    localStorage.removeItem("velvet_active_privates");
    document.getElementById("privateLog").value = "";
    renderPrivates();
}

setInterval(renderPrivates, 1000);

/* SECURITY */
function securityLog() {
    const name = document.getElementById("personName").value || "Unbekannt";
    const reason = document.getElementById("reason").value || "Kein Grund angegeben";
    const action = document.getElementById("action").value;

    const old = localStorage.getItem("velvet_security_log") || "";

    const text = `🛡️ **Velvet Shadow Security Log**

Person: ${name}
Maßnahme: ${action}
Grund: ${reason}
Zeitpunkt: ${new Date().toLocaleString("de-DE")}

— Velvet Security

-----------------------------

`;

    const fullLog = old + text;
    document.getElementById("securityOutput").value = fullLog;
    localStorage.setItem("velvet_security_log", fullLog);
}

function clearSecurityLog() {
    if (!confirm("Security Log wirklich löschen?")) return;
    document.getElementById("securityOutput").value = "";
    localStorage.removeItem("velvet_security_log");
}

/* LEADERSHIP */
function copySummary() {
    let total = 0;
    let itemCount = 0;

    products.forEach(p => {
        total += counts[p.name] * p.price;
        itemCount += counts[p.name];
    });

    const text = `👑 **Velvet Shadow Tagesübersicht**

Gesamte Artikel: ${itemCount}
Gesamtumsatz Bar: ${total.toLocaleString("de-DE")}$

Laufende Privates: ${activePrivates.length}

Datum: ${new Date().toLocaleString("de-DE")}

— Leadership`;

    document.getElementById("summaryOutput").value = text;
    localStorage.setItem("velvet_summary", text);
}

/* COPY */
function copyText(id) {
    const el = document.getElementById(id);
    el.select();
    document.execCommand("copy");
}

/* SOUNDS */
function playClickSound() {
    const sound = document.getElementById("clickSound");
    sound.currentTime = 0;
    sound.volume = 0.35;
    sound.play().catch(() => {});
}

let lastHover = 0;

function playHoverSound() {
    const now = Date.now();
    if (now - lastHover < 140) return;
    lastHover = now;

    const sound = document.getElementById("hoverSound");
    sound.currentTime = 0;
    sound.volume = 0.11;
    sound.play().catch(() => {});
}

document.addEventListener("click", function(e) {
    if (
        e.target.tagName === "BUTTON" ||
        e.target.closest(".card") ||
        e.target.closest(".role-btn") ||
        e.target.closest(".private-card")
    ) {
        playClickSound();
    }
});

document.addEventListener("mouseover", function(e) {
    if (
        e.target.closest(".card") ||
        e.target.closest(".role-btn") ||
        e.target.closest(".private-card") ||
        e.target.tagName === "BUTTON" ||
        e.target.tagName === "INPUT" ||
        e.target.tagName === "TEXTAREA"
    ) {
        playHoverSound();
    }
});

/* LOAD SAVED DATA */
function loadSaved() {
    const savedLog = localStorage.getItem("velvet_log");
    if (savedLog) document.getElementById("logOutput").value = savedLog;

    const savedPrivate = localStorage.getItem("velvet_private_log");
    if (savedPrivate) {
        privateHistory = savedPrivate;
        document.getElementById("privateLog").value = savedPrivate;
    }

    const savedSecurity = localStorage.getItem("velvet_security_log");
    if (savedSecurity) document.getElementById("securityOutput").value = savedSecurity;

    const savedSummary = localStorage.getItem("velvet_summary");
    if (savedSummary) document.getElementById("summaryOutput").value = savedSummary;
}

/* INIT */
renderProducts();
loadSaved();
renderPrivates();
currentTotal = calculateTotal();
document.getElementById("total").innerText = currentTotal.toLocaleString("de-DE") + "$";
document.getElementById("leaderTotal").innerText = currentTotal.toLocaleString("de-DE") + "$";
update();
</script>

</body>
</html>
